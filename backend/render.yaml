services:
  - type: web
    name: patient-care-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: patient-care-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: FIREBASE_CREDS_JSON
        sync: false

databases:
  - name: patient-care-db
    plan: free
    databaseName: patient_care
    user: patient_care
