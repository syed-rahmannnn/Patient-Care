name: patient_care
description: Nurse companion app for the Patient Care System.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Networking & state
  dio: ^5.7.0
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2

  # Realtime
  web_socket_channel: ^3.0.1

  # Firebase / push
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
